<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PALIS / 九类 OC 设定卡编辑器</title>
  <style>
    :root {
      --bg: #090b0c;
      --panel: #101416;
      --panel-2: #151a1d;
      --line: #2c353a;
      --ink: #e6e1d7;
      --muted: #7e898f;
      --blue: #527df0;
      --amber: #c4aa68;
      --red: #d15250;
      --sans: "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      --mono: "Cascadia Mono", "IBM Plex Mono", Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); }
    body {
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    button, input, textarea { font: inherit; }
    button { color: inherit; }
    .app { min-height: 100vh; display: grid; grid-template-rows: 74px minmax(0,1fr); }
    .topbar {
      position: relative; z-index: 4; display: flex; align-items: center; gap: 18px;
      padding: 0 22px; border-bottom: 1px solid var(--line); background: rgba(9,11,12,.94);
      backdrop-filter: blur(14px);
    }
    .brand { min-width: 280px; }
    .brand strong { display: block; font: 700 18px/1 var(--mono); letter-spacing: .08em; }
    .brand span { display: block; margin-top: 7px; color: var(--muted); font: 12px/1 var(--mono); letter-spacing: .06em; }
    .save-state { margin-right: auto; color: var(--muted); font: 12px/1 var(--mono); }
    .save-state::before { content: ""; display: inline-block; width: 7px; height: 7px; margin-right: 8px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 12px var(--blue); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .btn {
      min-height: 34px; padding: 0 12px; border: 1px solid var(--line); background: var(--panel);
      cursor: pointer; font: 12px/1 var(--mono); letter-spacing: .03em; transition: .18s ease;
    }
    .btn:hover { border-color: #738087; background: #1a2023; transform: translateY(-1px); }
    .btn:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
    .btn.primary { border-color: #3c62c6; background: #2448a6; }
    .btn.warn { color: #dd8a87; }
    .workspace { min-height: 0; display: grid; grid-template-columns: 224px minmax(440px,1fr) 344px; }
    .nav, .inspector { min-height: 0; overflow: auto; background: rgba(12,15,16,.93); }
    .nav { border-right: 1px solid var(--line); padding: 18px 12px; }
    .nav-title, .inspector-title { margin: 2px 8px 14px; color: var(--muted); font: 11px/1 var(--mono); letter-spacing: .12em; }
    .card-tab {
      width: 100%; display: grid; grid-template-columns: 38px 1fr; gap: 10px; align-items: center;
      min-height: 58px; margin-bottom: 6px; padding: 8px 10px; border: 1px solid transparent; background: transparent;
      text-align: left; cursor: pointer; transition: .16s ease;
    }
    .card-tab:hover { background: #151a1d; }
    .card-tab.active { border-color: #3c4850; background: #181e21; }
    .tab-code { color: var(--muted); font: 20px/1 var(--mono); }
    .card-tab.active .tab-code { color: var(--tab-accent, var(--blue)); }
    .tab-copy b { display: block; font-size: 14px; font-weight: 600; }
    .tab-copy small { display: block; margin-top: 5px; color: var(--muted); font: 10px/1.2 var(--mono); }
    .stage { min-width: 0; min-height: 0; display: grid; grid-template-rows: auto minmax(0,1fr) auto; }
    .stage-head { display: flex; align-items: end; justify-content: space-between; gap: 20px; padding: 18px 24px 12px; }
    .stage-head h1 { margin: 0; font-size: 20px; font-weight: 650; }
    .stage-head p { margin: 5px 0 0; color: var(--muted); font-size: 12px; }
    .page-count { color: var(--muted); font: 12px/1 var(--mono); }
    .canvas-wrap { min-height: 0; overflow: auto; display: grid; place-items: start center; padding: 12px 26px 30px; }
    .paper {
      width: min(100%, 720px); aspect-ratio: 3 / 4; background: #0b0d0e; box-shadow: 0 28px 80px rgba(0,0,0,.52);
      transition: .25s ease; isolation: isolate;
    }
    .paper svg { display: block; width: 100%; height: 100%; }
    .paper [data-key] { cursor: pointer; }
    .paper [data-key]:hover { filter: drop-shadow(0 0 5px rgba(97,134,239,.9)); }
    .stage-note { padding: 11px 24px 14px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; }
    .stage-note b { color: var(--ink); font-weight: 500; }
    .inspector { border-left: 1px solid var(--line); padding: 18px 16px 80px; }
    .inspector-meta { margin: -5px 8px 18px; color: var(--muted); font-size: 12px; line-height: 1.6; }
    .field { display: block; margin: 0 0 14px; }
    .field > span { display: flex; justify-content: space-between; margin: 0 2px 7px; color: #abb3b6; font-size: 12px; }
    .field em { color: var(--muted); font: normal 10px/1 var(--mono); }
    .field input, .field textarea {
      width: 100%; border: 1px solid #30393d; background: #0b0e10; color: var(--ink); border-radius: 0;
      padding: 10px 11px; line-height: 1.55; resize: vertical;
    }
    .field input:hover, .field textarea:hover { border-color: #4e5c63; }
    .field textarea { min-height: 76px; }
    .field.flash input, .field.flash textarea { animation: fieldFlash .8s ease; }
    @keyframes fieldFlash { 0%,100% { border-color: #30393d; } 35% { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(82,125,240,.18); } }
    .toolbar-divider { width: 1px; height: 28px; background: var(--line); }
    .toast {
      position: fixed; left: 50%; bottom: 26px; z-index: 20; transform: translate(-50%, 16px); opacity: 0;
      padding: 10px 14px; border: 1px solid #465158; background: #111719; color: var(--ink); pointer-events: none;
      font-size: 13px; transition: .2s ease;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    @media (max-width: 1120px) {
      .workspace { grid-template-columns: 188px minmax(420px,1fr) 310px; }
      .brand { min-width: 220px; }
      .actions .optional { display: none; }
    }
    @media (max-width: 820px) {
      .app { grid-template-rows: auto auto; }
      .topbar { min-height: 78px; padding: 12px 14px; flex-wrap: wrap; }
      .brand { min-width: 0; margin-right: auto; }
      .save-state { display: none; }
      .workspace { display: block; }
      .nav { display: flex; overflow-x: auto; border-right: 0; border-bottom: 1px solid var(--line); padding: 8px; }
      .nav-title { display: none; }
      .card-tab { min-width: 116px; margin: 0 4px; grid-template-columns: 28px 1fr; }
      .tab-copy small { display: none; }
      .stage { min-height: auto; }
      .canvas-wrap { overflow: visible; padding: 10px 12px 24px; }
      .inspector { border-left: 0; border-top: 1px solid var(--line); }
      .toolbar-divider { display: none; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
    @media print {
      body { background: #fff; }
      .topbar, .nav, .inspector, .stage-head, .stage-note { display: none !important; }
      .workspace, .stage, .canvas-wrap { display: block; padding: 0; }
      .paper { width: 100vw; height: 100vh; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><strong>PALIS / OC CARD LAB</strong><span>九类档案 · 九种角色观察方式</span></div>
      <div class="save-state" id="saveState">修改会自动保存在此浏览器</div>
      <div class="actions">
        <button class="btn optional" id="importBtn">导入数据</button>
        <button class="btn optional" id="exportDataBtn">导出整套数据</button>
        <span class="toolbar-divider"></span>
        <button class="btn" id="svgBtn">导出 SVG</button>
        <button class="btn primary" id="pngBtn">导出 PNG</button>
      </div>
    </header>

    <main class="workspace">
      <nav class="nav" id="nav"><div class="nav-title">ARCHIVE LENSES / 档案视角</div></nav>
      <section class="stage">
        <div class="stage-head">
          <div><h1 id="stageTitle"></h1><p id="stageSubtitle"></p></div>
          <div class="page-count" id="pageCount"></div>
        </div>
        <div class="canvas-wrap"><div class="paper" id="paper" aria-label="OC 设定卡预览"></div></div>
        <div class="stage-note"><b>编辑方法：</b>使用右侧字段；也可以直接点击卡片上的文字跳到对应字段。内容自动保存。</div>
      </section>
      <aside class="inspector">
        <div class="inspector-title">CARD CONTENT / 卡片内容</div>
        <div class="inspector-meta" id="inspectorMeta"></div>
        <form id="form"></form>
        <button class="btn warn" id="resetBtn" type="button">恢复这张卡的示例内容</button>
      </aside>
    </main>
  </div>
  <input id="fileInput" type="file" accept="application/json,.json" hidden />
  <div class="toast" id="toast"></div>

  <script>
    const schemas = [
      {
        id: "country", code: "01", title: "国家档案 OC 卡", en: "STATE OF ORIGIN", accent: "#315ed2",
        subtitle: "角色如何被出生地、国籍与国家机器塑造",
        fields: [
          ["name","角色姓名","托马斯·E·马洛里"],["ocCode","人物编号","P31"],["country","国家归属","美国"],
          ["birthplace","出生地","纽约州罗切斯特"],["citizenship","身份状态","美国公民 / BAS 民用技术员"],
          ["language","语言与口音","英语 / 纽约州口音"],["stateRelation","与国家的关系","受国家任务体系雇佣，但不完全信任机构对证据的解释。","long"],
          ["politicalPressure","国家施加的压力","事故复核、保密义务与“唯一生还者”的公共叙事。","long"],
          ["whiteAbyssLink","与白幕的国家关联","HZ-6 样本线任务 / 美国南极测绘局","long"]
        ]
      },
      {
        id: "organization", code: "02", title: "组织档案 OC 卡", en: "CHAIN OF COMMAND", accent: "#6688ef",
        subtitle: "用任职、权限、忠诚与内部关系定义角色",
        fields: [
          ["name","角色姓名","托马斯·E·马洛里"],["ocCode","人物编号","P31"],["organization","所属组织","BAS / 美国南极测绘局"],
          ["department","部门","民用影像技术组"],["position","职位","影像技术员 / HZ-6 四号位"],["clearance","权限级别","任务影像与曝光记录 / 无底片复核权"],
          ["superior","直接负责人","P28 艾伦·M·拉斯克"],["loyalty","忠诚对象","优先忠于可复核的记录，而非组织口径。","long"],
          ["internalConflict","组织内冲突","事故后口述与胶片内容被分开评估，他无法接触冲洗底片。","long"]
        ]
      },
      {
        id: "station", code: "03", title: "科考站点 OC 卡", en: "STATION SHIFT BOARD", accent: "#7ba8d8",
        subtitle: "通过空间、值班、生活痕迹与生存习惯观察角色",
        fields: [
          ["name","角色姓名","托马斯·E·马洛里"],["ocCode","人物编号","P31"],["station","驻留站点","HZ-6 地表营地 / 临时设施"],
          ["room","床位或工作区","暗袋、器材箱与胶片封套旁的四号位"],["shift","值班时段","随样本线行动 / 非固定班次"],
          ["stationRole","站内职责","低温相机测试、胶片编号、曝光卡维护"],["routine","个人日常","出发前逐卷复核编号；回站后先封存再口述。","long"],
          ["survivalHabit","生存习惯","把器材动作记成固定顺序，用程序对抗疲劳与失温。","long"],
          ["roomTrace","留下的痕迹","两台相机测试记录、六卷胶片编号、未完成的曝光卡。","long"]
        ]
      },
      {
        id: "entrance", code: "04", title: "白幕入口 OC 卡", en: "DESCENT / RETURN LOG", accent: "#ded8ca",
        subtitle: "记录角色越过边界时的身体、记忆与返回条件",
        fields: [
          ["name","角色姓名","托马斯·E·马洛里"],["ocCode","人物编号","P31"],["entrance","关联入口","HZ-6A 回撤线"],
          ["firstContact","首次接触","1952.08.19 / HZ-6 样本线行动"],["depth","最深记录","未形成可靠深度记录"],
          ["bodyResponse","身体反应","左臂骨裂、早期失温、接触时段记忆中断","long"],["anchor","返回锚点","换卷、过片、闪光触发的肌肉记忆","long"],
          ["lostThing","在入口失去的东西","连续时序，以及判断自己是否完成记录的把握。","long"],
          ["returnCondition","返回后的条件","生还，但口述不得替代胶片与无线电证据。","long"]
        ]
      },
      {
        id: "ecology", code: "05", title: "生态档案 OC 卡", en: "HABITAT TOLERANCE", accent: "#9aa675",
        subtitle: "角色与温度、光线、地貌和活体环境的相互影响",
        fields: [
          ["name","角色姓名","托马斯·E·马洛里"],["ocCode","人物编号","P31"],["biome","关联生态","暮色针叶层 / 样本线环境"],
          ["adaptation","适应方式","低温胶片经验、固定操作顺序、器材冗余"],["sensitivity","敏感因素","失温、声源不明的点名、光线与距离错判"],
          ["environmentEffect","环境对角色的改变","越依赖机械程序，越怀疑自己的记忆是否仍属于自己。","long"],
          ["characterEffect","角色对环境的影响","摄影把不可见的痕迹固定成可争议的证物。","long"],
          ["fieldSign","环境留下的标记","回撤线外 1.4 英里发现；胶片与口述时序不闭合。","long"],
          ["tolerance","耐受评估","寒冷 62 / 黑暗 71 / 声源干扰 28 / 记忆稳定 34"]
        ]
      },
      {
        id: "person", code: "06", title: "相关人物 OC 卡", en: "PERSONNEL PORTRAIT", accent: "#527df0",
        subtitle: "最接近传统 OC 设定卡的人事卷版本",
        fields: [
          ["name","角色姓名","托马斯·E·马洛里"],["nameEn","英文名","THOMAS E. MALLORY"],["ocCode","人物编号","P31"],
          ["birth","出生","1924.06.11 / 纽约州罗切斯特"],["occupation","身份职业","BAS 民用影像技术员 / 战时航空摄影冲洗员"],
          ["appearance","外貌设定","暂无肖像资料：建议保留“面貌未公开”，由作者补写。","long"],["personality","性格","谨慎、程序化，对“看见”和“能够证明”的边界异常敏感。","long"],
          ["motivation","角色动机","找出胶片与口述不一致的原因，恢复 HZ-6 的现场时序。","long"],
          ["contradiction","核心矛盾","唯一确认生还者，却不是一名完整证人。","long"],["arc","人物弧光","记录者 → 被审视的证物 → 重新夺回叙述权的人。","long"]
        ]
      },
      {
        id: "event", code: "07", title: "事件档案 OC 卡", en: "INCIDENT CHRONOLOGY", accent: "#cb5755",
        subtitle: "角色在一个事件里做了什么选择，又付出什么代价",
        fields: [
          ["name","角色姓名","托马斯·E·马洛里"],["ocCode","人物编号","P31"],["eventCode","事件编号","EV10 / EV11"],
          ["eventName","事件名称","HZ-6 第六个回答 / 胶片先行签收"],["eventDate","发生时间","1952.08.19 → 1952.11.19"],
          ["before","事件之前","完成两台相机低温测试，将六卷胶片分别编号。","long"],["choice","关键选择","按固定动作继续换卷、过片和触发闪光，而不是追逐不明声源。","long"],
          ["after","事件之后","在回撤线外被发现；接受医学观察和分段访谈。","long"],["consequence","长期后果","1953 年退出现场工作；证词与影像被永久分开评估。","long"]
        ]
      },
      {
        id: "anomaly", code: "08", title: "异常档案 OC 卡", en: "COGNITIVE INTERFERENCE", accent: "#db4d4b",
        subtitle: "记录异常如何作用于角色，而不是只罗列能力数值",
        fields: [
          ["name","角色姓名","托马斯·E·马洛里"],["ocCode","人物编号","P31"],["anomalyCode","异常编号","A04 / A15"],
          ["manifestation","异常表现","第三次点名出现第六个回答；同号胶片封套先于胶卷归队。","long"],["trigger","触发条件","HZ-6 样本线行动、声源不明、胶片交接"],
          ["symptom","角色症状","阶段性记忆缺失；只能确认操作动作，不能确认画面内容。","long"],["risk","风险等级","认知与证据链双重污染 / 高"],
          ["containment","当前控制","口述、胶片、无线电和搜救记录必须独立交叉复核。","long"],["uncertainty","尚未确认","第六个回答者身份；先行签收封套的来源。","long"]
        ]
      },
      {
        id: "species", code: "09", title: "物种档案 OC 卡", en: "SPECIMEN RELATION", accent: "#c7ae72",
        subtitle: "从角色与未知物种的观察、接触和互相改变建立设定",
        fields: [
          ["name","角色姓名","托马斯·E·马洛里"],["ocCode","人物编号","P31"],["speciesCode","物种编号","S07 / S11"],
          ["speciesName","关联物种","Leucocuticulata complex / Dendrotherium longirameum"],["commonName","卷内称呼","白壳复合体 / 长枝树兽"],
          ["observation","观察方式","通过失败胶片、足迹、白壳碎片与根板记录间接接触。","long"],["contact","接触结果","马洛里没有看过冲洗底片，无法确认自己是否曾直接看见它们。","long"],
          ["mutualTrace","相互留下的痕迹","物种留下影像与样本；角色留下编号、曝光方向和一条不完整证词。","long"],
          ["fieldQuestion","研究问题","相机记录的是生物本体，还是被白幕改写后的观察关系？","long"]
        ]
      }
    ];

    const STORE_KEY = "palis-oc-card-lab-v1";
    const defaults = Object.fromEntries(schemas.map(s => [s.id, Object.fromEntries(s.fields.map(f => [f[0], f[2]]))]));
    let data = loadData();
    let current = "person";
    let toastTimer;

    const $ = s => document.querySelector(s);
    const esc = v => String(v ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const v = key => data[current]?.[key] ?? "";
    const schema = () => schemas.find(s => s.id === current);
    const safeId = value => String(value || "card").replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]+/g, "-");

    function loadData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY));
        return Object.fromEntries(schemas.map(s => [s.id, {...defaults[s.id], ...(saved?.[s.id] || {})}]));
      } catch { return structuredClone(defaults); }
    }
    function saveData() {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
      $("#saveState").textContent = "已自动保存 · " + new Date().toLocaleTimeString("zh-CN", {hour:"2-digit", minute:"2-digit"});
    }
    function showToast(message) {
      clearTimeout(toastTimer); const el = $("#toast"); el.textContent = message; el.classList.add("show");
      toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
    }
    function t(x,y,content,size=24,fill="#e4dfd4",weight=400,anchor="start",key="",family="'Microsoft YaHei UI','Microsoft YaHei',sans-serif",spacing=0) {
      return `<text x="${x}" y="${y}" fill="${fill}" font-family="${family}" font-size="${size}" font-weight="${weight}" text-anchor="${anchor}" letter-spacing="${spacing}" ${key?`data-key="${key}"`:""}>${esc(content)}</text>`;
    }
    function multi(x,y,content,max=18,size=22,fill="#aab0ae",leading=34,key="",weight=400) {
      const raw = String(content || ""); const rows = []; let row = "";

      $("#paper").querySelector("svg").addEventListener("click",e=>{
        const target=e.target.closest("[data-key]"); if(!target) return; const key=target.dataset.key;
        const input=$("#form").elements[key]; if(input){input.focus(); input.scrollIntoView({behavior:"smooth",block:"center"}); const field=input.closest(".field"); field.classList.remove("flash"); void field.offsetWidth; field.classList.add("flash");}
      });
    }
    function renderAll() {
      const s=schema(); renderNav(); renderForm(); renderCard();
      $("#stageTitle").textContent=s.title; $("#stageSubtitle").textContent=s.subtitle;
      $("#pageCount").textContent=s.code+" / 09"; $("#inspectorMeta").textContent=s.subtitle+"。字段内容仅保存在你的浏览器中，导出数据可用于备份。";
    }
    function downloadBlob(blob,name) { const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
    function currentSvg() { return $("#paper").querySelector("svg").outerHTML; }
    $("#svgBtn").onclick=()=>{downloadBlob(new Blob([currentSvg()],{type:"image/svg+xml;charset=utf-8"}),`PALIS-${schema().code}-${safeId(v("name"))}.svg`);showToast("SVG 已导出，可继续用矢量软件编辑");};
    $("#pngBtn").onclick=()=>{
      const blob=new Blob([currentSvg()],{type:"image/svg+xml;charset=utf-8"}); const url=URL.createObjectURL(blob); const image=new Image();
      image.onload=()=>{const c=document.createElement("canvas");c.width=1200;c.height=1600;c.getContext("2d").drawImage(image,0,0);URL.revokeObjectURL(url);c.toBlob(b=>{downloadBlob(b,`PALIS-${schema().code}-${safeId(v("name"))}.png`);showToast("PNG 已导出");},"image/png");}; image.src=url;
    };
    $("#exportDataBtn").onclick=()=>{const payload={format:"PALIS_OC_CARD_LAB",version:1,exportedAt:new Date().toISOString(),cards:data};downloadBlob(new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}),"PALIS-OC九卡数据.json");showToast("整套数据已导出");};
    $("#importBtn").onclick=()=>$("#fileInput").click();
    $("#fileInput").onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const parsed=JSON.parse(await file.text());const incoming=parsed.cards||parsed;schemas.forEach(s=>{if(incoming[s.id])data[s.id]={...defaults[s.id],...incoming[s.id]};});saveData();renderAll();showToast("九张卡的数据已导入");}catch{showToast("无法读取：请选择本编辑器导出的 JSON");}e.target.value="";};
    $("#resetBtn").onclick=()=>{if(!confirm(`恢复“${schema().title}”的示例内容？当前卡片的修改会被覆盖。`))return;data[current]=structuredClone(defaults[current]);saveData();renderAll();showToast("当前卡片已恢复");};
    renderAll();
  </script>
</body>
</html>
